function switchTab(t,btn){
  currentTab=t;
  document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.remove('active');});
  if(btn)btn.classList.add('active');
  document.querySelectorAll('.tab-content').forEach(function(c){c.classList.remove('active');});
  document.getElementById('tab-'+t).classList.add('active');
  var fab=document.getElementById('fab-btn');
  fab.style.display=t==='nutrition'?'flex':'none';
  closeFab();
  if(t==='nutrition')renderNutrition();
  if(t==='weight')renderWeight();
  if(t==='whoop')renderWhoop();
  window.scrollTo({top:0,behavior:'smooth'});
}

function toggleFab(){
  fabOpen=!fabOpen;
  document.getElementById('fab-menu').classList.toggle('open',fabOpen);
  document.getElementById('fab-backdrop').classList.toggle('open',fabOpen);
  document.getElementById('fab-btn').style.transform=fabOpen?'rotate(45deg)':'';
}
function closeFab(){
  fabOpen=false;
  document.getElementById('fab-menu').classList.remove('open');
  document.getElementById('fab-backdrop').classList.remove('open');
  document.getElementById('fab-btn').style.transform='';
}
function fabAdd(mk){

function saveTodayFood(f){var d=load('nl_food',{});d[today()]=f;save('nl_food',d);}
function calcTotals(f){
  var t={cal:0,pro:0,carb:0,fat:0};
  MEALS.forEach(function(m){(f[m.key]||[]).forEach(function(e){t.cal+=e.cal;t.pro+=e.pro;t.carb+=e.carb;t.fat+=e.fat;});});
  return t;
}

function renderNutrition(){
  var f=getTodayFood(),t=calcTotals(f);
  var rem=TARGETS.cal-t.cal;
  var remStyle=rem>=0?'color:var(--green)':'color:var(--red)';
  var remText=rem>=0?r(rem)+' kcal remaining':r(Math.abs(rem))+' kcal over';

  var h='<div class="deficit-banner">';
  h+='<div class="deficit-card"><div class="label">TDEE</div><div class="val">1,794</div><div class="sub">kcal/day</div></div>';
  h+='<div class="deficit-card"><div class="label">Deficit Target</div><div class="val" style="color:var(--green)">1,294</div><div class="sub">kcal/day</div></div>';
  h+='<div class="deficit-card"><div class="label">Today</div><div class="val">'+r(t.cal)+'</div><div class="sub" style="'+remStyle+';font-weight:700">'+remText+'</div></div>';
  h+='</div>';

  h+='<div class="callout">Your plan (~1,810 kcal) is set at maintenance. The 1,294 target reflects a 500 kcal deficit for 0.5 kg/week loss. Confirm changes with your nutritionist.</div>';

  var macros=[
    {label:'Calories',cur:t.cal,target:TARGETS.cal,unit:'kcal',color:'var(--green)'},
    {label:'Protein',cur:t.pro,target:TARGETS.pro,unit:'g',color:'var(--purple)'},
    {label:'Carbs',cur:t.carb,target:TARGETS.carb,unit:'g',color:'var(--tan)'},
    {label:'Fats',cur:t.fat,target:TARGETS.fat,unit:'g',color:'var(--amber)'}
  ];
  h+='<div class="grid-4" style="margin-bottom:14px">';
  macros.forEach(function(m){
    var pct=m.target>0?m.cur/m.target:0;
    var isOver=pct>1;
    var filled=Math.min(10,Math.round(pct*10));
    h+='<div class="macro-card"><div class="macro-label">'+m.label+'</div>';
    h+='<div class="macro-nums"><span class="macro-cur" style="color:'+(isOver?'var(--red)':m.color)+'">'+r(m.cur)+'</span><span class="macro-target">/ '+r(m.target)+' '+m.unit+'</span></div>';
    h+='<div class="blocks">';
    for(var i=0;i<10;i++)h+='<div class="block'+(i<filled?(isOver?' over':' filled'):'')+'"></div>';
    h+='</div>';
    h+='<div class="bar-track"><div class="bar-fill'+(isOver?' over':'')+'" style="width:'+Math.min(100,pct*100)+'%;background:'+(isOver?'var(--red)':m.color)+'"></div></div>';
    h+='</div>';
  });
  h+='</div>';

  h+='<div class="section-label">Meals</div>';
  h+='<div class="grid-2">';
  MEALS.forEach(function(m){
    var items=f[m.key]||[];
    var mt={cal:0,pro:0,carb:0,fat:0};
    items.forEach(function(e){mt.cal+=e.cal;mt.pro+=e.pro;mt.carb+=e.carb;mt.fat+=e.fat;});
    h+='<div class="meal-section"><div class="meal-header"><span class="meal-title">'+m.icon+' '+m.name+'</span></div>';
    h+='<div class="meal-items">';
    if(!items.length){
      h+='<div class="empty-state">No food logged</div>';
    } else {
      items.forEach(function(e,i){
        h+='<div class="meal-item" ontouchstart="swipeStart(event)" ontouchmove="swipeMove(event,this)" ontouchend="swipeEnd(event,this,\''+m.key+'\','+i+')">';
        h+='<div class="meal-item-inner"><div class="meal-item-info"><div class="meal-item-name">'+e.name+'</div><div class="meal-item-macros">'+r(e.cal)+' kcal · P'+r(e.pro)+' C'+r(e.carb)+' F'+r(e.fat)+'</div></div>';
        h+='<button class="del-btn" onclick="deleteFood(\''+m.key+'\','+i+')">×</button></div>';
        h+='<div class="swipe-delete">Delete</div>';
        h+='</div>';
      });
    }
    h+='</div>';
    if(items.length){
      h+='<div class="pill-row"><span class="pill">'+r(mt.cal)+' kcal</span><span class="pill">P '+r(mt.pro)+'g</span><span class="pill">C '+r(mt.carb)+'g</span><span class="pill">F '+r(mt.fat)+'g</span></div>';
    }
    h+='<button class="add-btn" onclick="openModal(\''+m.key+'\')">+ Add food</button>';
    h+='</div>';
  });
  h+='</div>';
  h+='<button class="btn-danger" onclick="resetToday()">Reset today</button>';
  document.getElementById('tab-nutrition').innerHTML=h;
}

var swipeStartX=0;
function swipeStart(e){swipeStartX=e.touches[0].clientX;}
function swipeMove(e,el){
  var dx=e.touches[0].clientX-swipeStartX;
  if(dx<-30)el.classList.add('swiped');
  if(dx>30)el.classList.remove('swiped');
}
function swipeEnd(e,el,mk,idx){
  if(el.classList.contains('swiped')){
    var del=el.querySelector('.swipe-delete');
    del.onclick=function(){deleteFood(mk,idx);};
  }
}

function deleteFood(mk,idx){var f=getTodayFood();if(f[mk])f[mk].splice(idx,1);saveTodayFood(f);renderNutrition();}
function resetToday(){var d=load('nl_food',{});delete d[today()];save('nl_food',d);renderNutrition();}

function openModal(mk){
  currentMealKey=mk;
  document.getElementById('modal-overlay').classList.add('open');
  renderPresets('');
  var sf=document.getElementById('search-field');
  sf.value='';
  switchModalTab('quick',null);
  setTimeout(function(){sf.focus();},350);
}
function closeModal(e){if(e.target===document.getElementById('modal-overlay'))document.getElementById('modal-overlay').classList.remove('open');}
function switchModalTab(t,btn){
  document.querySelectorAll('.modal-tab').forEach(function(b,i){b.classList.toggle('active',(i===0&&t==='quick')||(i===1&&t==='manual'));});
  document.getElementById('modal-quick').style.display=t==='quick'?'block':'none';
  document.getElementById('modal-manual').style.display=t==='manual'?'block':'none';
}
function filterPresets(q){renderPresets(q);}
function renderPresets(q){
  var list=document.getElementById('preset-list');
  var filtered=PRESETS.filter(function(p){return !q||p.name.toLowerCase().indexOf(q.toLowerCase())>=0;});
  var h='';
  filtered.forEach(function(p){
    var idx=PRESETS.indexOf(p);
    h+='<div class="preset-item" onclick="addPreset('+idx+')"><div class="preset-name">'+p.name+'</div><div class="preset-detail">'+p.cal+' kcal · P'+p.pro+' C'+p.carb+' F'+p.fat+'</div></div>';
  });
  if(!filtered.length)h='<div class="empty-state">No matches found</div>';
  list.innerHTML=h;
}
function addPreset(idx){
  var p=PRESETS[idx];
  var f=getTodayFood();
  if(!f[currentMealKey])f[currentMealKey]=[];
  f[currentMealKey].push({name:p.name,cal:p.cal,pro:p.pro,carb:p.carb,fat:p.fat});
  saveTodayFood(f);
  document.getElementById('modal-overlay').classList.remove('open');
  renderNutrition();
}
function addManualFood(){
  var name=document.getElementById('m-name').value.trim();
  var cal=parseFloat(document.getElementById('m-cal').value)||0;
  var pro=parseFloat(document.getElementById('m-pro').value)||0;
  var carb=parseFloat(document.getElementById('m-carb').value)||0;
  var fat=parseFloat(document.getElementById('m-fat').value)||0;
  if(!name||(!cal&&!pro&&!carb&&!fat))return;
  var f=getTodayFood();
  if(!f[currentMealKey])f[currentMealKey]=[];
  f[currentMealKey].push({name:name,cal:cal,pro:pro,carb:carb,fat:fat});
  saveTodayFood(f);
  document.getElementById('modal-overlay').classList.remove('open');
  ['m-name','m-cal','m-pro','m-carb','m-fat'].forEach(function(id){document.getElementById(id).value='';});
  renderNutrition();
}

function renderWeight(){
  var data=load('nl_weight',[]);
  data.sort(function(a,b){return a.date.localeCompare(b.date);});
  var first=data[0]||null,last=data[data.length-1]||null,prev=data.length>1?data[data.length-2]:null;
  var startW=first?first.val:'—',curW=last?last.val:'—',trend='';
  if(last&&prev){var d=last.val-prev.val;trend=d<0?'<span style="color:var(--green)">▼ '+Math.abs(d).toFixed(1)+'</span>':'<span style="color:var(--red)">▲ +'+d.toFixed(1)+'</span>';}
  var totalLost=first&&last?(last.val-first.val):0;
  var totalColor=totalLost<=0?'var(--green)':'var(--red)';
  var totalText=totalLost<=0?totalLost.toFixed(1)+' kg':'+'+(totalLost).toFixed(1)+' kg';

  var h='<div class="grid-3" style="margin-bottom:12px">';
  h+='<div class="card"><div class="card-title">Starting</div><div class="card-value">'+(typeof startW==='number'?startW.toFixed(1):startW)+'</div><div class="card-sub">kg</div></div>';
  h+='<div class="card"><div class="card-title">Current</div><div class="card-value">'+(typeof curW==='number'?curW.toFixed(1):curW)+'</div><div class="card-sub">'+trend+'</div></div>';
  h+='<div class="card"><div class="card-title">Total Lost</div><div class="card-value" style="color:'+totalColor+'">'+totalText+'</div><div class="card-sub">since start</div></div>';
  h+='</div>';

  h+='<div class="card"><div class="card-title">Log Weight</div>';
  h+='<div class="form-row"><div class="form-group"><label class="form-label">Date</label><input class="form-input" id="w-date" type="date" value="'+today()+'"></div>';
  h+='<div class="form-group"><label class="form-label">Weight (kg)</label><input class="form-input" id="w-val" type="number" inputmode="decimal" step="0.1" min="0" placeholder="65.5"></div></div>';
  h+='<div class="form-group full" style="margin-bottom:10px"><label class="form-label">Notes (optional)</label><input class="form-input" id="w-note" type="text" placeholder="e.g. morning, fasted"></div>';
  h+='<button class="btn-primary" onclick="saveWeight()">Save</button></div>';

  h+='<div class="card"><div class="card-title">Weight Over Time</div><div class="chart-container"><canvas id="weight-chart"></canvas></div></div>';

  h+='<div class="card"><div class="card-title">History</div><div class="log-list">';
  if(!data.length)h+='<div class="empty-state">No entries yet — log your first weigh-in above</div>';
  for(var i=data.length-1;i>=0;i--){
    var e=data[i],delta='';
    if(i>0){var d=e.val-data[i-1].val;delta=d<0?'<span class="log-delta" style="color:var(--green)">▼'+Math.abs(d).toFixed(1)+'</span>':'<span class="log-delta" style="color:var(--red)">▲+'+d.toFixed(1)+'</span>';}
    h+='<div class="log-item"><span class="log-date">'+e.date+'</span><span class="log-val">'+e.val.toFixed(1)+' kg</span>'+delta+'<span class="log-note">'+(e.note||'')+'</span><button class="del-btn" onclick="deleteWeight('+i+')">×</button></div>';
  }
  h+='</div></div>';
  document.getElementById('tab-weight').innerHTML=h;
  renderWeightChart(data);
}

function saveWeight(){
  var d=document.getElementById('w-date').value,v=parseFloat(document.getElementById('w-val').value);
  if(!d||isNaN(v))return;
  var n=document.getElementById('w-note').value.trim();
  var data=load('nl_weight',[]);
  data=data.filter(function(e){return e.date!==d;});
  data.push({date:d,val:v,note:n});
  data.sort(function(a,b){return a.date.localeCompare(b.date);});
  save('nl_weight',data);
  renderWeight();
}
function deleteWeight(idx){
  var data=load('nl_weight',[]);
  data.sort(function(a,b){return a.date.localeCompare(b.date);});
  data.splice(idx,1);
  save('nl_weight',data);
  renderWeight();
}
function renderWeightChart(data){
  if(charts.weight)charts.weight.destroy();
  var c=document.getElementById('weight-chart');
  if(!c||!data.length)return;
  charts.weight=new Chart(c.getContext('2d'),{
    type:'line',
    data:{labels:data.map(function(e){return e.date.slice(5);}),datasets:[{data:data.map(function(e){return e.val;}),borderColor:'#6a9e72',backgroundColor:'#6a9e7233',fill:true,tension:0.3,pointRadius:4,pointBackgroundColor:'#6a9e72',borderWidth:2}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:11},color:'#8a8a8a'},grid:{display:false}},y:{ticks:{font:{size:11},color:'#8a8a8a'},grid:{color:'#e0dbd433'}}}}
  });
}

function renderWhoop(){
  var data=load('nl_whoop',[]);
  data.sort(function(a,b){return a.date.localeCompare(b.date);});
  var last=data.length?data[data.length-1]:null;

  var metrics=[
    {label:'Day Strain',val:last?last.strain:'—',unit:'/21',max:21,color:'var(--tan)'},
    {label:'Resting HR',val:last?last.rhr:'—',unit:'bpm',max:100,color:'var(--purple)'},
    {label:'HRV',val:last?last.hrv:'—',unit:'ms',max:200,color:'var(--green)'},
    {label:'VO2 Max',val:last?last.vo2:'—',unit:'ml/kg/min',max:60,color:'var(--amber)'}
  ];

  var h='<div class="grid-4" style="margin-bottom:12px">';
  metrics.forEach(function(m){
    var pct=typeof m.val==='number'?(m.val/m.max*100):0;
    h+='<div class="whoop-card"><div class="whoop-label">'+m.label+'</div><div class="whoop-val" style="color:'+m.color+'">'+(typeof m.val==='number'?m.val:'—')+'</div><div class="whoop-unit">'+m.unit+'</div><div class="whoop-bar"><div class="whoop-bar-fill" style="width:'+Math.min(100,pct)+'%;background:'+m.color+'"></div></div></div>';
  });
  h+='</div>';

  h+='<div class="card"><div class="card-title">Log Whoop Data</div>';
  h+='<div class="form-row"><div class="form-group"><label class="form-label">Date</label><input class="form-input" id="wh-date" type="date" value="'+today()+'"></div>';
  h+='<div class="form-group"><label class="form-label">Day Strain</label><input class="form-input" id="wh-strain" type="number" inputmode="decimal" step="0.1" min="0" max="21" placeholder="0-21"></div></div>';
  h+='<div class="form-row"><div class="form-group"><label class="form-label">Resting HR</label><input class="form-input" id="wh-rhr" type="number" inputmode="numeric" min="0" placeholder="bpm"></div>';
  h+='<div class="form-group"><label class="form-label">HRV</label><input class="form-input" id="wh-hrv" type="number" inputmode="numeric" min="0" placeholder="ms"></div></div>';
  h+='<div class="form-row"><div class="form-group"><label class="form-label">VO2 Max</label><input class="form-input" id="wh-vo2" type="number" inputmode="decimal" step="0.1" min="0" placeholder="ml/kg/min"></div>';
  h+='<div class="form-group"><label class="form-label">Calories</label><input class="form-input" id="wh-cal" type="number" inputmode="numeric" min="0" placeholder="kcal burned"></div></div>';
  h+='<button class="btn-primary" onclick="saveWhoop()">Save</button></div>';

  h+='<div class="grid-2" style="margin-bottom:12px">';
  h+='<div class="card"><div class="card-title">HRV Trend</div><div class="chart-container"><canvas id="hrv-chart"></canvas></div></div>';
  h+='<div class="card"><div class="card-title">Strain Trend</div><div class="chart-container"><canvas id="strain-chart"></canvas></div></div>';
  h+='</div>';

  h+='<div class="card"><div class="card-title">Whoop Log</div><div class="log-list">';
  if(!data.length)h+='<div class="empty-state">No Whoop data yet — log your first entry above</div>';
  for(var i=data.length-1;i>=0;i--){
    var e=data[i];
    h+='<div class="log-item"><span class="log-date">'+e.date+'</span><div class="whoop-pills"><span class="whoop-pill">⚡'+e.strain+'</span><span class="whoop-pill">❤️'+e.rhr+'</span><span class="whoop-pill">💚'+e.hrv+'</span><span class="whoop-pill">🫁'+e.vo2+'</span><span class="whoop-pill">🔥'+e.cal+'</span></div><button class="del-btn" onclick="deleteWhoop('+i+')">×</button></div>';
  }
  h+='</div></div>';
  document.getElementById('tab-whoop').innerHTML=h;
  renderWhoopCharts(data);
}

function saveWhoop(){
  var d=document.getElementById('wh-date').value;
  if(!d)return;
  var strain=parseFloat(document.getElementById('wh-strain').value)||0;
  var rhr=parseFloat(document.getElementById('wh-rhr').value)||0;
  var hrv=parseFloat(document.getElementById('wh-hrv').value)||0;
  var vo2=parseFloat(document.getElementById('wh-vo2').value)||0;
  var cal=parseFloat(document.getElementById('wh-cal').value)||0;
  var data=load('nl_whoop',[]);
  data=data.filter(function(e){return e.date!==d;});
  data.push({date:d,strain:strain,rhr:rhr,hrv:hrv,vo2:vo2,cal:cal});
  data.sort(function(a,b){return a.date.localeCompare(b.date);});
  save('nl_whoop',data);
  renderWhoop();
}
function deleteWhoop(idx){
  var data=load('nl_whoop',[]);
  data.sort(function(a,b){return a.date.localeCompare(b.date);});
  data.splice(idx,1);
  save('nl_whoop',data);
  renderWhoop();
}
function renderWhoopCharts(data){
  if(charts.hrv)charts.hrv.destroy();
  if(charts.strain)charts.strain.destroy();
  var c1=document.getElementById('hrv-chart'),c2=document.getElementById('strain-chart');
  if(!c1||!c2||!data.length)return;
  var labels=data.map(function(e){return e.date.slice(5);});
  charts.hrv=new Chart(c1.getContext('2d'),{
    type:'line',
    data:{labels:labels,datasets:[{data:data.map(function(e){return e.hrv;}),borderColor:'#6a9e72',backgroundColor:'#6a9e7233',fill:true,tension:0.3,pointRadius:4,pointBackgroundColor:'#6a9e72',borderWidth:2}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:11},color:'#8a8a8a'},grid:{display:false}},y:{ticks:{font:{size:11},color:'#8a8a8a'},grid:{color:'#e0dbd433'}}}}
  });
  charts.strain=new Chart(c2.getContext('2d'),{
    type:'line',
    data:{labels:labels,datasets:[{data:data.map(function(e){return e.strain;}),borderColor:'#b5835a',backgroundColor:'#b5835a33',fill:true,tension:0.3,pointRadius:4,pointBackgroundColor:'#b5835a',borderWidth:2}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:11},color:'#8a8a8a'},grid:{display:false}},y:{ticks:{font:{size:11},color:'#8a8a8a'},grid:{color:'#e0dbd433'}}}}
  });
}

renderNutrition();
</script>
